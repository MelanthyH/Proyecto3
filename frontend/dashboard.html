<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Proyectos - TaskEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="w-full border-b border-gray-100 bg-white">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-sm group-hover:bg-indigo-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                </div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">TaskEasy</span>
            </a>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm text-gray-500"></span>
                <button onclick="cerrarSesion()" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Cerrar sesión</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 mb-1">Mis Proyectos</h1>
                <div class="flex items-center gap-3">
                    <span id="planBadge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700">
                        Plan: Free
                    </span>
                    <a id="mejorarLink" href="pago.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700 underline hidden">Mejorar a Pro</a>
                </div>
            </div>
            <button onclick="abrirModal()" class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Nuevo proyecto
            </button>
        </div>

        <!-- Free Plan Limit Banner -->
        <div id="limiteBanner" class="hidden mb-6 p-4 bg-amber-50 border border-amber-200 rounded-xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p class="text-sm text-amber-800">Has alcanzado el límite de proyectos en el plan Free.</p>
            </div>
            <a href="pago.html" class="text-sm font-semibold text-amber-700 hover:text-amber-900 underline">Mejorar a Pro</a>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-1">Aún no tienes proyectos</h3>
            <p class="text-gray-500 text-sm">¡Crea el primero para comenzar a organizar tus tareas!</p>
        </div>

        <!-- Projects Grid -->
        <div id="projectsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0" onclick="cerrarModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-lg relative z-10">
                <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                    <h3 id="modalTitulo" class="text-lg font-bold text-gray-900">Nuevo proyecto</h3>
                    <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <form id="projectForm" onsubmit="guardarProyecto(event)" class="p-6 space-y-5">
                    <input type="hidden" id="projectId">

                    <div>
                        <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1.5">Nombre del proyecto</label>
                        <input type="text" id="nombre" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="Ej: Proyecto de Investigación">
                    </div>

                    <div>
                        <label for="descripcion" class="block text-sm font-medium text-gray-700 mb-1.5">Descripción</label>
                        <textarea id="descripcion" rows="3" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-none" placeholder="Describe brevemente el objetivo del proyecto..."></textarea>
                    </div>

                    <div class="flex items-center justify-end gap-3 pt-2">
                        <button type="button" onclick="cerrarModal()" class="px-5 py-2.5 text-sm font-medium text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
                            Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full bg-white border-t border-gray-100 py-6">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm text-gray-400">Proyecto IF4101 - Sede del Caribe, UCR · 2025</p>
        </div>
    </footer>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================

        // Cambia a false cuando tengas el backend funcionando
        const MODO_DESARROLLO = true;

        const API_URL = 'http://localhost:8080/api';

        // Datos demo para desarrollo (se usan solo si MODO_DESARROLLO = true)
        const datosDemo = {
            token: 'demo-token-jwt',
            user: {
                nombre: 'Usuario Demo',
                plan: 'FREE'
            },
            proyectos: [{
                id: 1,
                nombre: 'Proyecto Final IF4101',
                descripcion: 'Desarrollo del sistema TaskEasy para la asignatura de Ingeniería de Software.',
                cantidadTareas: 12
            }, {
                id: 2,
                nombre: 'Tesis de Maestría',
                descripcion: 'Investigación sobre metodologías ágiles en equipos distribuidos.',
                cantidadTareas: 5
            }, {
                id: 3,
                nombre: 'Planificación Viaje',
                descripcion: 'Organizar itinerario, reservas y presupuesto para el viaje de diciembre.',
                cantidadTareas: 0
            }]
        };

        // ============================================
        // INICIALIZACIÓN
        // ============================================

        // En modo desarrollo, precargar datos demo en localStorage si no existen
        if (MODO_DESARROLLO && !localStorage.getItem('token')) {
            localStorage.setItem('token', datosDemo.token);
            localStorage.setItem('user', JSON.stringify(datosDemo.user));
        }

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Redirigir si no hay token (solo en producción)
        if (!MODO_DESARROLLO && !token) {
            window.location.href = 'login.html';
        }

        // Mostrar nombre de usuario
        document.getElementById('userName').textContent = user.nombre || 'Usuario';

        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            cargarPlan();
            cargarProyectos();
        });

        // ============================================
        // FUNCIONES DE API / DEMO
        // ============================================

        async function cargarPlan() {
            if (MODO_DESARROLLO) {
                renderizarPlan(user.plan || 'FREE');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/payments/plan`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (!res.ok) return;

                const plan = await res.json();
                renderizarPlan(plan);
            } catch (e) {
                console.error('Error cargando plan:', e);
            }
        }

        function renderizarPlan(plan) {
            const badge = document.getElementById('planBadge');
            const link = document.getElementById('mejorarLink');
            const esFree = plan === 'FREE' || plan === 'Free';

            if (esFree) {
                badge.textContent = 'Plan: Free';
                badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700';
                link.classList.remove('hidden');
            } else {
                badge.textContent = 'Plan: Pro ⭐';
                badge.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800';
                link.classList.add('hidden');
            }
        }

        async function cargarProyectos() {
            if (MODO_DESARROLLO) {
                renderizarProyectos(datosDemo.proyectos);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/projects`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (!res.ok) return;

                const proyectos = await res.json();
                renderizarProyectos(proyectos);
            } catch (e) {
                console.error('Error cargando proyectos:', e);
            }
        }

        function renderizarProyectos(proyectos) {
            const grid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');

            if (proyectos.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.innerHTML = proyectos.map(p => `
                <div class="bg-white rounded-xl border border-gray-100 p-6 shadow-sm hover:shadow-md transition-all group cursor-pointer" onclick="verProyecto(${p.id})">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                            </svg>
                        </div>
                        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation()">
                            <button onclick="editarProyecto(${p.id})" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Editar">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button onclick="eliminarProyecto(${p.id})" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900 mb-1 group-hover:text-indigo-600 transition-colors">${p.nombre}</h3>
                    <p class="text-sm text-gray-500 line-clamp-2 mb-3">${p.descripcion || ''}</p>
                    <div class="flex items-center gap-1.5 text-xs text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        ${p.cantidadTareas !== undefined ? p.cantidadTareas : 0} tarea${p.cantidadTareas !== 1 ? 's' : ''}
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // MODAL (CREAR / EDITAR)
        // ============================================

        function abrirModal(proyecto = null) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('projectForm').reset();
            document.getElementById('projectId').value = '';

            if (proyecto) {
                document.getElementById('modalTitulo').textContent = 'Editar proyecto';
                document.getElementById('projectId').value = proyecto.id;
                document.getElementById('nombre').value = proyecto.nombre;
                document.getElementById('descripcion').value = proyecto.descripcion || '';
            } else {
                document.getElementById('modalTitulo').textContent = 'Nuevo proyecto';
            }
        }

        function cerrarModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function guardarProyecto(e) {
            e.preventDefault();
            const id = document.getElementById('projectId').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value
            };

            if (MODO_DESARROLLO) {
                if (id) {
                    // Editar demo
                    const idx = datosDemo.proyectos.findIndex(p => p.id == id);
                    if (idx !== -1) datosDemo.proyectos[idx] = {...datosDemo.proyectos[idx],
                        ...data
                    };
                } else {
                    // Crear demo
                    const esFree = (user.plan || 'FREE') === 'FREE';
                    if (esFree && datosDemo.proyectos.length >= 3) {
                        document.getElementById('limiteBanner').classList.remove('hidden');
                        cerrarModal();
                        return;
                    }
                    datosDemo.proyectos.push({
                        id: Date.now(),
                        ...data,
                        cantidadTareas: 0
                    });
                }
                cerrarModal();
                renderizarProyectos(datosDemo.proyectos);
                return;
            }

            const url = id ? `${API_URL}/projects/${id}` : `${API_URL}/projects`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (res.status === 403) {
                    document.getElementById('limiteBanner').classList.remove('hidden');
                    cerrarModal();
                    return;
                }
                if (!res.ok) return;

                cerrarModal();
                cargarProyectos();
            } catch (e) {
                console.error('Error guardando proyecto:', e);
            }
        }

        // ============================================
        // ACCIONES
        // ============================================

        function verProyecto(id) {
            window.location.href = `proyecto.html?id=${id}`;
        }

        async function editarProyecto(id) {
            if (MODO_DESARROLLO) {
                const proyecto = datosDemo.proyectos.find(p => p.id == id);
                if (proyecto) abrirModal(proyecto);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/projects/${id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (!res.ok) return;

                const proyecto = await res.json();
                abrirModal(proyecto);
            } catch (e) {
                console.error('Error cargando proyecto:', e);
            }
        }

        async function eliminarProyecto(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este proyecto? Se eliminarán también todas sus tareas.')) return;

            if (MODO_DESARROLLO) {
                datosDemo.proyectos = datosDemo.proyectos.filter(p => p.id != id);
                renderizarProyectos(datosDemo.proyectos);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/projects/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (!res.ok) return;

                cargarProyectos();
            } catch (e) {
                console.error('Error eliminando proyecto:', e);
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>

</body>

</html>
