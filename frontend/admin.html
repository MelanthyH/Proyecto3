<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - TaskEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        function showAdminMessage(text, type = 'info') {
            const container = document.getElementById('adminMessage');
            const inner = document.getElementById('adminMessageInner');
            if (!container || !inner) return;
            inner.textContent = text;
            inner.className = 'p-3 rounded-lg text-sm ' + (type === 'success' ? 'bg-green-50 text-green-800' : (type === 'error' ? 'bg-red-50 text-red-800' : 'bg-blue-50 text-blue-800'));
            container.classList.remove('hidden');
            setTimeout(() => { container.classList.add('hidden'); }, 3500);
        }

        function showAdminConfirm(text, onConfirm) {
            const container = document.getElementById('adminMessage');
            const inner = document.getElementById('adminMessageInner');
            if (!container || !inner) {
                if (confirm(text)) onConfirm();
                return;
            }
            inner.innerHTML = `<div class="flex items-center justify-between gap-3"><div>${text}</div><div class=\"flex items-center gap-2\"><button id=\"adminConfirmNo\" class=\"px-3 py-1 rounded-lg bg-gray-100\">No</button><button id=\"adminConfirmYes\" class=\"px-3 py-1 rounded-lg bg-indigo-600 text-white\">Si</button></div></div>`;
            container.classList.remove('hidden');
            document.getElementById('adminConfirmNo').onclick = () => { container.classList.add('hidden'); };
            document.getElementById('adminConfirmYes').onclick = () => { container.classList.add('hidden'); onConfirm(); };
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="w-full border-b border-gray-100 bg-white">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-sm group-hover:bg-indigo-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                </div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">TaskEasy</span>
            </a>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-500">Admin</span>
                <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Gestión de Usuarios</h1>
                <p class="text-sm text-gray-500 mt-1">Administra las cuentas registradas en la plataforma</p>
            </div>
            <button class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Nuevo usuario
            </button>
        </div>

        <!-- Mensajes de UI -->
        <div id="adminMessage" class="max-w-7xl mx-auto mb-4 px-6 hidden">
            <div id="adminMessageInner" class="p-3 rounded-lg text-sm"></div>
        </div>

        <!-- Edit User Modal -->
        <div id="editModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 modal-backdrop" onclick="closeEditModal()"></div>
            <div class="absolute inset-0 flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-md relative z-10">
                    <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                        <h3 id="editModalTitle" class="text-lg font-bold text-gray-900">Editar usuario</h3>
                        <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 transition-colors">✖</button>
                    </div>
                    <form id="editUserForm" class="p-6 space-y-4" onsubmit="submitEditUser(event)">
                        <input type="hidden" id="editUserId">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario</label>
                            <input id="editUsername" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
                            <input id="editEmail" type="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900" />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
                                <select id="editRole" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl">
                                    <option value="User">User</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Plan</label>
                                <select id="editPlan" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl">
                                    <option value="Free">Free</option>
                                    <option value="Pro">Pro</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-3 pt-2">
                            <button type="button" onclick="closeEditModal()" class="px-5 py-2.5 text-sm font-medium text-gray-700 border border-gray-200 rounded-xl">Cancelar</button>
                            <button type="submit" class="px-5 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-100 bg-gray-50/50">
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Correo</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Plan</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Estado</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTbody" class="divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
                <p id="paginationInfo" class="text-sm text-gray-500">Mostrando 0 resultados</p>
                <div class="flex items-center gap-2">
                    <button class="px-3 py-1.5 text-sm text-gray-400 border border-gray-200 rounded-lg cursor-not-allowed">Anterior</button>
                    <button class="px-3 py-1.5 text-sm text-gray-400 border border-gray-200 rounded-lg cursor-not-allowed">Siguiente</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full bg-white border-t border-gray-100 py-6">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm text-gray-400">Proyecto IF4101 - Sede del Caribe, UCR · 2026</p>
        </div>
    </footer>

    <script>
        const API_URL = 'http://localhost:5217/api';
        const token = localStorage.getItem('token');

        document.addEventListener('DOMContentLoaded', () => {
            cargarUsuarios();
        });

        async function cargarUsuarios() {
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                if (!res.ok) return;

                const usuarios = await res.json();
                const tbody = document.getElementById('usersTbody');

                tbody.innerHTML = usuarios.map(u => `
                    <tr class="hover:bg-gray-50/50">
                        <td class="px-6 py-4 text-sm text-gray-500 font-mono">${u.id}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${u.username}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${u.email || ''}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${u.plan || ''}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Activo</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="editarUsuario(${u.id})" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Editar">✏️</button>
                                <button onclick="eliminarUsuario(${u.id})" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                const info = document.getElementById('paginationInfo');
                if (info) info.textContent = `Mostrando ${Array.isArray(usuarios) ? usuarios.length : 0} resultados`;
            } catch (e) {
                console.error('Error cargando usuarios:', e);
            }
        }

        async function eliminarUsuario(id) {

            showAdminConfirm('¿Eliminar este usuario?', async () => {
                try {
                    const res = await fetch(`${API_URL}/admin/users/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 401) {
                        window.location.href = 'login.html';
                        return;
                    }
                    if (!res.ok) {
                        showAdminMessage('No se pudo eliminar el usuario.', 'error');
                        return;
                    }
                    showAdminMessage('Usuario eliminado correctamente.', 'success');
                    cargarUsuarios();
                } catch (e) {
                    console.error('Error eliminando usuario:', e);
                    showAdminMessage('Error eliminando usuario.', 'error');
                }
            });
        }

        function editarUsuario(id) {

            loadUserForEdit(id);
        }

        async function loadUserForEdit(id) {
            try {
                const res = await fetch(`${API_URL}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 401) { window.location.href = 'login.html'; return; }
                if (!res.ok) return;
                const usuarios = await res.json();
                const user = usuarios.find(u => u.id === id);
                if (!user) { alert('Usuario no encontrado'); return; }

                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUsername').value = user.username || '';
                document.getElementById('editEmail').value = user.email || '';
                document.getElementById('editRole').value = user.role || 'User';
                document.getElementById('editPlan').value = user.plan || 'Free';

                document.getElementById('editModal').classList.remove('hidden');
            } catch (e) { console.error('Error cargando usuario para editar:', e); }
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        async function submitEditUser(e) {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const payload = {
                username: document.getElementById('editUsername').value,
                email: document.getElementById('editEmail').value,
                role: document.getElementById('editRole').value,
                plan: document.getElementById('editPlan').value
            };

            try {
                const res = await fetch(`${API_URL}/admin/users/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (res.status === 401) { window.location.href = 'login.html'; return; }
                if (!res.ok) {
                    const text = await res.text();
                    alert('Error actualizando: ' + text);
                    return;
                }

                closeEditModal();
                cargarUsuarios();
                alert('Usuario actualizado correctamente.');
            } catch (e) { console.error('Error editando usuario:', e); }
        }
    </script>

</body>

</html>
