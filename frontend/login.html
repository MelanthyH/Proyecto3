<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - TaskEasy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="w-full border-b border-gray-100 bg-white">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-sm group-hover:bg-indigo-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                </div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">TaskEasy</span>
            </a>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="flex-1 flex items-center justify-center py-16 px-6">
        <div class="w-full max-w-md">
            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 md:p-10">

                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Bienvenido de vuelta</h1>
                    <p class="text-gray-500 text-sm">Ingresa tus credenciales para continuar</p>
                </div>

                <!-- Form -->
                <form action="#" method="POST" class="space-y-5">

                    <!-- Usuario -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Usuario</label>
                        <input type="text" id="email" name="email" placeholder="tu_usuario" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                               required>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                            <a href="#" class="text-xs font-medium text-indigo-600 hover:text-indigo-700 transition-colors">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                               required>
                    </div>

                    <!-- Remember me -->
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="remember" class="ml-2 text-sm text-gray-600">Recordarme</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="w-full px-5 py-3 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm">
                        Iniciar sesión
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 bg-white text-gray-400">o</span>
                    </div>
                </div>

                <!-- Register link -->
                <p class="text-center text-sm text-gray-500">
                    ¿No tienes una cuenta?
                    <a href="registro.html" class="font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">Regístrate gratis</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="w-full bg-white border-t border-gray-100 py-6">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <p class="text-sm text-gray-400">Proyecto IF4101 - Sede del Caribe, UCR · 2025</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
